<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Course Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        /* -- Reset -- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100vh;
            overflow: hidden;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f4f4f5;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
        }

        /* -- Header -- */
        .header {
            text-align: center;
            margin-bottom: 12px;
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #18181b;
        }

        .header p {
            font-size: 0.8rem;
            color: #a1a1aa;
            margin-top: 4px;
        }

        /* -- Two column layout -- */
        .layout {
            display: flex;
            gap: 24px;
            max-width: 960px;
            margin: 0 auto;
            align-items: flex-start;
            flex: 1;
            min-height: 0;
        }

        @media (max-width: 768px) {
            .layout {
                flex-direction: column;
            }
        }

        /* -- Card panels -- */
        .card {
            background: #fff;
            border: 1px solid #e4e4e7;
            border-radius: 12px;
            padding: 16px;
        }

        .card.form-card {
            flex: 0 0 320px;
        }

        .card.list-card {
            flex: 1;
            min-width: 0;
            overflow-y: auto;
            max-height: 100%;
        }

        /* -- Form inputs -- */
        .label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            color: #71717a;
            margin-bottom: 12px;
        }

        .fields {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #e4e4e7;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            outline: none;
            background: #fafafa;
            transition: border-color 0.15s;
        }

        input:focus {
            border-color: #71717a;
            background: #fff;
        }

        input::placeholder {
            color: #c4c4c4;
        }

        .mb {
            margin-bottom: 8px;
        }

        /* -- Buttons -- */
        button {
            padding: 7px 14px;
            border-radius: 7px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: opacity 0.15s;
        }

        button:hover {
            opacity: 0.75;
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .btn-primary {
            width: 100%;
            padding: 10px;
            background: #18181b;
            color: #fff;
            font-size: 0.875rem;
            margin-top: 8px;
        }

        .btn-save {
            background: #18181b;
            color: #fff;
        }

        .btn-cancel {
            background: #f4f4f5;
            color: #52525b;
        }

        .btn-edit {
            background: #f4f4f5;
            color: #3f3f46;
        }

        .btn-del {
            background: #fff1f2;
            color: #e11d48;
        }

        /* -- Student rows -- */
        ul {
            list-style: none;
        }

        li {
            padding: 8px 12px;
            border: 1px solid #f0f0f0;
            border-radius: 9px;
            margin-bottom: 6px;
        }

        li:last-child {
            margin-bottom: 0;
        }

        .row-view {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            min-width: 0;
        }

        .row-edit {
            display: none;
        }

        .row-edit.active {
            display: block;
        }

        .row-view.hidden {
            display: none;
        }

        .actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .edit-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .idx {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #f4f4f5;
            border: 1px solid #e4e4e7;
            font-size: 0.68rem;
            font-weight: 600;
            color: #a1a1aa;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .sname {
            font-weight: 600;
            font-size: 0.87rem;
            color: #18181b;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .scourse {
            font-size: 0.79rem;
            color: #6366f1;
            font-weight: 500;
            margin: 2px 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .semail {
            font-size: 0.76rem;
            color: #a1a1aa;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* -- Char counter -- */
        .char-count {
            display: block;
            text-align: right;
            font-size: 0.68rem;
            color: #a1a1aa;
            margin-top: 3px;
            min-height: 14px;
        }

        .char-count.warn {
            color: #f97316;
        }

        .char-count.danger {
            color: #e11d48;
        }

        /* -- Empty state & toast -- */
        #empty {
            text-align: center;
            color: #c4c4c4;
            font-size: 0.85rem;
            padding: 16px 0;
        }

        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: #18181b;
            color: #fff;
            padding: 9px 18px;
            border-radius: 8px;
            font-size: 0.82rem;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            white-space: nowrap;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

<body>
    <!-- Header -->
    <div class="header">
        <h1>Student Management System</h1>
        <p>Lab Exercise: Cloud-Based Database and Web Application</p>
        <p style="margin-top:6px;font-size:0.75rem;color:#a1a1aa">
            Course: Distributed Systems &nbsp;·&nbsp; Topic: Cloud Databases and Web Application Integration
            &nbsp;·&nbsp; <strong style="color:#a1a1aa" id="author"></strong>
        </p>
        <a href="https://github.com/imfaris/cloud_lab" target="_blank"
            style="display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:4px 10px;background:#f4f4f5;border:1px solid #e4e4e7;border-radius:6px;font-size:0.75rem;color:#52525b;text-decoration:none;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.63-5.37-12-12-12z" />
            </svg>
            imfaris/cloud_lab
        </a>
    </div>

    <!-- Main layout -->
    <div class="layout">
        <!-- Add student form -->
        <div class="card form-card">
            <div class="label">Add New Student</div>
            <div class="fields">
                <div class="input-wrap">
                    <input id="name" placeholder="Full name" maxlength="50" autofocus>
                    <span class="char-count" id="cc-name"></span>
                </div>
                <div class="input-wrap">
                    <input id="email" placeholder="Email address" maxlength="50">
                    <span class="char-count" id="cc-email"></span>
                </div>
            </div>
            <div class="input-wrap mb">
                <input id="course" placeholder="Course" maxlength="50" style="margin:0">
                <span class="char-count" id="cc-course"></span>
            </div>
            <button class="btn-primary" onclick="addStudent()">Add Student</button>
        </div>

        <!-- Student list -->
        <div class="card list-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <div class="label" id="list-label" style="margin:0;">Student List</div>
                <div id="pagination" style="display:none; gap:6px; align-items:center;">
                    <button onclick="changePage(-1)" id="btn-prev" class="btn-cancel"
                        style="padding:3px 8px; font-size:0.7rem;">Prev</button>
                    <span id="page-info" style="font-size:0.7rem; color:#a1a1aa; font-weight:500;">Page 1</span>
                    <button onclick="changePage(1)" id="btn-next" class="btn-cancel"
                        style="padding:3px 8px; font-size:0.7rem;">Next</button>
                </div>
            </div>
            <ul id="list"></ul>
            <p id="empty" style="display:none">No students yet.</p>
        </div>
    </div>

    <div id="toast"></div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <script>
        /*
         * Step 1: Connect to Supabase (our cloud database)
         * Step 2: Define the app state (the data we keep track of)
         * Step 3: Small helper functions (toast, counting, etc.)
         * Step 4: CRUD functions (Create, Read, Update, Delete)
         * Step 5: UI toggle functions (switching between view/edit mode)
         * Step 6: Rendering (how we display students on the page)
         * Step 7: Start the app (fetch students from DB)
         *
         * Everything starts at Step 7 (bottom of the file).
         * loadStudents() loads students from the database,
         * then renderPage() draws them on screen.
         * After that, user actions call the CRUD functions.
         */


        // ==========================================
        // STEP 1: Connect to Supabase
        // ==========================================
        // we use supabase as our cloud database
        // createClient takes the project URL and the public API key
        const db = supabase.createClient(
            "https://jlsfllqpuzgyqekpoaqf.supabase.co",
            "sb_publishable__ZtrLIuhjmoUYwI6xREv3A_q3U550-Q"
        );


        // ==========================================
        // STEP 2: App State
        // ==========================================
        // these variables hold our data while the page is open
        let students = [];       // the array of all students
        let currentPage = 0;     // which page we're viewing
        const PAGE_SIZE = 5;     // how many students per page


        // ==========================================
        // STEP 3: Helper Functions
        // ==========================================

        // shows a small notification at the bottom of the screen
        let toastTimer;
        function toast(msg) {
            const t = document.getElementById("toast");
            t.textContent = msg;
            t.classList.add("show");
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
        }

        // updates the "Student List — X students" label
        function updateCount(n) {
            document.getElementById("list-label").textContent =
                n > 0 ? `Student List — ${n} student${n !== 1 ? "s" : ""}` : "Student List";
        }

        // shortcut to get a trimmed input value
        function val(id) {
            return document.getElementById(id).value.trim();
        }

        // pressing Enter in the form submits it, Escape cancels any open edit
        ["name", "email", "course"].forEach(id =>
            document.getElementById(id).addEventListener("keydown", e => {
                if (e.key === "Enter") addStudent();
            })
        );
        document.addEventListener("keydown", e => {
            if (e.key === "Escape")
                document.querySelectorAll(".row-edit.active").forEach(el =>
                    cancelEdit(el.id.replace("edit-", ""))
                );
        });

        // shows a character countdown when you're close to the 50 char limit
        function charCounter(inputId, counterId) {
            const input = document.getElementById(inputId);
            const counter = document.getElementById(counterId);
            input.addEventListener("input", () => {
                const remaining = 50 - input.value.length;
                if (remaining <= 15) {
                    counter.textContent = remaining + " chars left";
                    counter.className = "char-count " + (remaining <= 5 ? "danger" : "warn");
                } else {
                    counter.textContent = "";
                    counter.className = "char-count";
                }
            });
        }
        charCounter("name", "cc-name");
        charCounter("email", "cc-email");
        charCounter("course", "cc-course");


        // ==========================================
        // STEP 4: CRUD Functions
        // ==========================================
        // these are the main operations of the app
        // each one updates the screen first, then saves to the database

        // CREATE: add a new student
        function addStudent() {
            const name = val("name"), email = val("email"), course = val("course");

            // dont submit if any field is empty
            if (!name || !email || !course) {
                document.getElementById(!name ? "name" : !email ? "email" : "course").focus();
                return;
            }

            // add it to our local array and show it right away
            const tempId = "tmp-" + Date.now();
            students.push({ id: tempId, name, email, course });
            currentPage = Math.max(0, Math.ceil(students.length / PAGE_SIZE) - 1);
            renderPage();

            // clear the form
            ["name", "email", "course"].forEach(id => document.getElementById(id).value = "");
            document.getElementById("name").focus();
            toast("✓ Student added");

            // now save it to the database in the background
            db.from("students").insert([{ name, email, course }]).select().single()
                .then(({ data }) => {
                    if (data) {
                        const i = students.findIndex(s => s.id === tempId);
                        if (i !== -1) students[i] = data;
                        renderPage();
                    }
                });
        }

        // READ: load all students from the database
        async function loadStudents() {
            const { data } = await db.from("students").select("*").order("id", { ascending: true });
            let fetchedStudents = data || [];

            // hide my personal record from public view
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('v') !== '1') {
                const myName = atob("RmFyaXMgQWxzdWZ5YW5p");
                fetchedStudents = fetchedStudents.filter(s => s.name !== myName);
            }

            students = fetchedStudents;
            renderPage();
        }

        // UPDATE: save changes when editing a student
        function saveEdit(id) {
            const name = val(`en-${id}`), email = val(`ee-${id}`), course = val(`ec-${id}`);
            if (!name || !email || !course) return;

            // update in our local array
            const s = students.find(s => s.id.toString() === id.toString());
            if (s) { s.name = name; s.email = email; s.course = course; }

            // update whats on screen
            const view = document.getElementById(`view-${id}`);
            view.querySelector(".sname").textContent = name;
            view.querySelector(".scourse").textContent = course;
            view.querySelector(".semail").textContent = email;
            cancelEdit(id);
            toast("✓ Changes saved");

            // save to database
            db.from("students").update({ name, email, course }).eq("id", id).then();
        }

        // DELETE: remove a student
        function deleteStudent(id) {
            students = students.filter(s => s.id.toString() !== id.toString());
            renderPage();
            toast("Student removed");
            db.from("students").delete().eq("id", id).then();
        }


        // ==========================================
        // STEP 5: UI Toggles
        // ==========================================
        // these swap between the normal view and the edit/delete forms

        function startEdit(id) {
            document.getElementById(`view-${id}`).classList.add("hidden");
            document.getElementById(`edit-${id}`).classList.add("active");
            document.getElementById(`en-${id}`).focus();
        }

        function cancelEdit(id) {
            document.getElementById(`view-${id}`).classList.remove("hidden");
            document.getElementById(`edit-${id}`).classList.remove("active");
        }

        function confirmDelete(id) {
            document.getElementById(`view-${id}`).classList.add("hidden");
            document.getElementById(`del-${id}`).classList.add("active");
        }

        function cancelDelete(id) {
            document.getElementById(`view-${id}`).classList.remove("hidden");
            document.getElementById(`del-${id}`).classList.remove("active");
        }


        // ==========================================
        // STEP 6: Rendering
        // ==========================================
        // this is how we draw the student list on the page

        // builds the HTML for one student row
        function appendRow(s, index) {
            const li = document.createElement("li");
            li.innerHTML = `
                <div class="row-view" id="view-${s.id}">
                    <div style="display:flex;align-items:center;gap:10px;min-width:0">
                        <span class="idx">${index}</span>
                        <div>
                            <div class="sname">${s.name}</div>
                            <div class="scourse">${s.course}</div>
                            <div class="semail">${s.email}</div>
                        </div>
                    </div>
                    <div class="actions">
                        <button class="btn-edit" onclick="startEdit('${s.id}')">Edit</button>
                        <button class="btn-del" onclick="confirmDelete('${s.id}')">Delete</button>
                    </div>
                </div>
                <div class="row-edit" id="del-${s.id}" style="background:#fff1f2;border:1px solid #ffe4e6;padding:12px;border-radius:8px;">
                    <div style="font-size:0.85rem;color:#be123c;margin-bottom:8px;">Delete <b>${s.name}</b>?</div>
                    <div style="display:flex;gap:6px;">
                        <button class="btn-del" style="background:#e11d48;color:#fff;" onclick="deleteStudent('${s.id}')">Yes, Delete</button>
                        <button class="btn-cancel" style="background:transparent;color:#be123c;" onclick="cancelDelete('${s.id}')">Cancel</button>
                    </div>
                </div>
                <div class="row-edit" id="edit-${s.id}">
                    <div class="fields">
                        <input id="en-${s.id}" value="${s.name}" placeholder="Name">
                        <input id="ee-${s.id}" value="${s.email}" placeholder="Email">
                    </div>
                    <input id="ec-${s.id}" value="${s.course}" placeholder="Course" class="mb">
                    <div class="edit-actions">
                        <button class="btn-save" onclick="saveEdit('${s.id}')">Save</button>
                        <button class="btn-cancel" onclick="cancelEdit('${s.id}')">Cancel</button>
                    </div>
                </div>`;
            document.getElementById("list").appendChild(li);
        }

        // renders the current page of students
        function renderPage() {
            document.getElementById("list").innerHTML = "";
            const total = students.length;

            // if theres no students, show empty message
            if (total === 0) {
                document.getElementById("empty").style.display = "block";
                document.getElementById("pagination").style.display = "none";
                updateCount(0);
                return;
            }

            document.getElementById("empty").style.display = "none";
            document.getElementById("pagination").style.display = total > PAGE_SIZE ? "flex" : "none";

            // figure out which page we're on
            const maxPage = Math.max(0, Math.ceil(total / PAGE_SIZE) - 1);
            if (currentPage > maxPage) currentPage = maxPage;

            // slice the students array for just this page
            const from = currentPage * PAGE_SIZE;
            const pageData = students.slice(from, from + PAGE_SIZE);

            // update the prev/next buttons
            document.getElementById("btn-prev").disabled = currentPage === 0;
            document.getElementById("btn-next").disabled = currentPage >= maxPage;
            document.getElementById("page-info").textContent = `Page ${currentPage + 1}`;

            // draw each student
            pageData.forEach((s, i) => appendRow(s, from + i + 1));
            updateCount(total);
        }

        function changePage(delta) { currentPage += delta; renderPage(); }

        // I encoded my name to hide my personal name from the source code, I will delete the repo when the semester ends
        // Only decode and show it if the professor visits with a special link (?v=1)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('v') === '1') {
            document.getElementById("author").textContent = atob("RmFyaXMgQWxzdWZ5YW5p");
        } else {
            document.getElementById("author").textContent = "Student";
        }
        // ==========================================
        // STEP 7: Start the App
        // ==========================================
        // load students from the database
        loadStudents();
    </script>
</body>

</html>
